<section class="dashboard">
  <header class="dashboard__header">
    <h1>Medical Clinic Dashboard</h1>
    <p class="dashboard__subtitle">
      Powered by <strong>Metriport FHIR API</strong> — access comprehensive patient health data
    </p>
  </header>

  <div class="dashboard__grid">
    @for (card of cards; track card.title) {
      <a [routerLink]="card.route" class="dashboard__card" [style.--card-color]="card.color">
        <div class="dashboard__card-icon">{{ card.icon }}</div>
        <div class="dashboard__card-body">
          <h2>{{ card.title }}</h2>
          <p>{{ card.description }}</p>
        </div>
        <span class="dashboard__card-arrow">→</span>
      </a>
    }
  </div>

  <footer class="dashboard__footer">
    <p>
      All health data is retrieved from the
      <a href="https://docs.metriport.com/api-reference/fhir/endpoints" target="_blank" rel="noopener">
        Metriport FHIR R4 API
      </a>
    </p>
  </footer>
</section>
